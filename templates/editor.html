<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Výkaz práce 2026</title>
<style>
  :root {
    --blue:    #1F4E79;
    --blue2:   #2E75B6;
    --blue3:   #BDD7EE;
    --yellow:  #FFF2CC;
    --green:   #E2EFDA;
    --red-bg:  #FCE4D6;
    --gray:    #f4f5f7;
    --border:  #c8cdd4;
    --text:    #1a1a2e;
    --work:    #ffffff;
    --vac:     #fff8dc;
    --sick:    #fde8e8;
    --holiday: #ffe8d6;
  }

  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Arial, sans-serif;
         font-size: 13px; color: var(--text); background: #eef2f7; }

  /* ── Horní lišta ── */
  header {
    background: var(--blue);
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: .5px; margin: 0; }
  header .spacer { flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 12px; font-weight: 600;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-save   { background: #27ae60; color: #fff; }
  .btn-pdf    { background: #e67e22; color: #fff; }
  .btn-prev   { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); }
  .save-status { font-size: 11px; color: rgba(255,255,255,.7); min-width: 120px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 10px 24px 0;
    background: var(--blue);
    overflow-x: auto;
  }
  .tab {
    padding: 7px 14px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.65);
    background: rgba(255,255,255,.1);
    border: none;
    white-space: nowrap;
    transition: background .15s;
  }
  .tab:hover { background: rgba(255,255,255,.2); color: #fff; }
  .tab.active { background: #eef2f7; color: var(--blue); }
  .tab .badge {
    display: inline-block;
    background: var(--blue2);
    color: #fff;
    border-radius: 10px;
    padding: 0 6px;
    font-size: 10px;
    margin-left: 4px;
  }
  .tab.active .badge { background: var(--blue2); }

  /* ── Obsah ── */
  main { padding: 20px 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Karta ── */
  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    background: var(--blue);
    color: #fff;
    padding: 10px 16px;
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-body { padding: 16px; }

  /* ── Roční přehled ── */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .month-card {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .15s, border-color .15s;
  }
  .month-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.12); border-color: var(--blue2); }
  .month-card .mc-head {
    background: var(--blue2);
    color: #fff;
    padding: 7px 12px;
    font-weight: 700;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
  }
  .month-card .mc-body {
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.8;
  }
  .month-card .mc-body .row { display: flex; justify-content: space-between; }
  .month-card .mc-body .val { font-weight: 700; color: var(--blue); }
  .month-card .mc-body .val.hours { font-size: 15px; }
  .month-card .mc-footer {
    background: var(--gray);
    padding: 5px 12px;
    font-size: 11px;
    color: #666;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }
  .pill-vac  { background: var(--vac);  color: #8a6d00; }
  .pill-sick { background: var(--sick); color: #a00; }

  /* Roční součet */
  .year-total {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat-box {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    min-width: 140px;
    text-align: center;
  }
  .stat-box .sv { font-size: 22px; font-weight: 800; color: var(--blue); }
  .stat-box .sl { font-size: 11px; color: #666; margin-top: 2px; }

  /* ── Měsíční tabulka ── */
  .month-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .month-toolbar h2 { margin: 0; font-size: 15px; color: var(--blue); }
  .month-toolbar .spacer { flex: 1; }

  .legend { display: flex; gap: 8px; align-items: center; font-size: 11px; }
  .leg-item { display: flex; align-items: center; gap: 4px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #ccc; }

  table.days {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  table.days th {
    background: var(--blue);
    color: #fff;
    padding: 6px 8px;
    text-align: left;
    font-size: 11px;
    white-space: nowrap;
  }
  table.days td {
    padding: 3px 6px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
  }
  table.days tr.work    td { background: var(--work); }
  table.days tr.vacation td { background: var(--vac); }
  table.days tr.sick    td { background: var(--sick); }
  table.days tr.holiday td { background: var(--holiday); color: #888; }
  table.days tr:hover td { filter: brightness(.97); }

  .type-select {
    padding: 2px 4px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    background: transparent;
    cursor: pointer;
  }
  .time-input {
    width: 58px;
    padding: 2px 4px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    text-align: center;
  }
  .time-input:disabled { opacity: .4; cursor: not-allowed; }
  .hours-cell { font-weight: 700; text-align: center; min-width: 40px; }

  tfoot td {
    font-weight: 700;
    font-size: 13px;
    padding: 6px 8px;
    border-top: 2px solid var(--blue);
    background: var(--blue3);
    color: var(--blue);
  }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: #27ae60; color: #fff;
    padding: 10px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #e74c3c; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>📋 Výkaz práce 2026</h1>
  <div class="spacer"></div>
  <span class="save-status" id="saveStatus"></span>
  <button class="btn btn-save" onclick="saveData()">💾 Uložit</button>
</header>

<div class="tabs" id="tabBar">
  <button class="tab active" data-panel="overview" onclick="switchTab(this,'overview')">📊 Přehled roku</button>
  {% for i in range(12) %}
  <button class="tab" data-panel="m{{ i+1 }}" onclick="switchTab(this,'m{{ i+1 }}')">
    {{ mesice[i] }}<span class="badge" id="badge{{ i+1 }}">–</span>
  </button>
  {% endfor %}
</div>

<main>

  <!-- ══ Přehled roku ══ -->
  <div class="panel active" id="panel-overview">
    <div class="year-total" id="yearStats"></div>
    <div class="card">
      <div class="card-header">📅 Přehled měsíců 2026</div>
      <div class="card-body">
        <div class="year-grid" id="yearGrid"></div>
      </div>
    </div>
  </div>

  <!-- ══ Měsíční panely ══ -->
  {% for i in range(12) %}
  <div class="panel" id="panel-m{{ i+1 }}">
    <div class="month-toolbar">
      <h2>{{ mesice[i] }} 2026</h2>
      <div class="spacer"></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#fff"></div> Práce</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--vac)"></div> Dovolená</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--sick)"></div> Nemoc</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--holiday)"></div> Svátek</div>
      </div>
      <button class="btn btn-pdf" onclick="generatePdf({{ i+1 }})">
        <span id="pdfSpinner{{ i+1 }}" style="display:none" class="spinner"></span>
        📄 Generovat PDF
      </button>
      <a class="btn btn-prev" id="pdfLink{{ i+1 }}" href="/api/pdf/2026/{{ i+1 }}"
         target="_blank" style="display:none">🔎 Otevřít PDF</a>
    </div>
    <div class="card">
      <div class="card-header" id="mhead{{ i+1 }}">{{ mesice[i] }} 2026 — načítám...</div>
      <div class="card-body" style="padding:0">
        <table class="days" id="dtable{{ i+1 }}">
          <thead>
            <tr>
              <th style="width:90px">Datum</th>
              <th style="width:60px">Den</th>
              <th style="width:130px">Typ</th>
              <th style="width:75px">Začátek</th>
              <th style="width:75px">Konec</th>
              <th style="width:55px; text-align:center">Hodin</th>
            </tr>
          </thead>
          <tbody id="tbody{{ i+1 }}"></tbody>
          <tfoot id="tfoot{{ i+1 }}"></tfoot>
        </table>
      </div>
    </div>
  </div>
  {% endfor %}

</main>

<div class="toast" id="toast"></div>

<script>
const MESICE = {{ mesice | tojson }};
const DNYTYDEN = ["Pondělí","Úterý","Středa","Čtvrtek","Pátek","Sobota","Neděle"];
let DATA = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const resp = await fetch("/api/data/2026");
  DATA = await resp.json();
  renderAll();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  renderOverview();
  for (let m = 1; m <= 12; m++) renderMonth(m);
}

function monthStats(m) {
  const days = DATA.months[String(m)]?.days || [];
  let work = 0, vac = 0, sick = 0, hours = 0;
  for (const d of days) {
    if (d.type === "work")     { work++; hours += calcHours(d.start, d.end); }
    if (d.type === "vacation") vac++;
    if (d.type === "sick")     sick++;
  }
  return { work, vac, sick, hours };
}

function calcHours(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);
  return (eh * 60 + em - sh * 60 - sm) / 60;
}

function renderOverview() {
  let totalHours = 0, totalKc = 0, totalVac = 0, totalSick = 0;
  const rate = DATA.rate || 400;

  const grid = document.getElementById("yearGrid");
  grid.innerHTML = "";

  for (let m = 1; m <= 12; m++) {
    const s = monthStats(m);
    totalHours += s.hours;
    totalVac   += s.vac;
    totalSick  += s.sick;
    totalKc    += s.hours * rate;

    const mc = document.createElement("div");
    mc.className = "month-card";
    mc.onclick = () => { document.querySelector(`[data-panel="m${m}"]`).click(); };
    mc.innerHTML = `
      <div class="mc-head">
        <span>${MESICE[m-1]}</span>
        <span>${s.hours} h</span>
      </div>
      <div class="mc-body">
        <div class="row"><span>Odprac. dny</span><span class="val">${s.work}</span></div>
        <div class="row"><span>Hodiny</span><span class="val hours">${s.hours}</span></div>
        <div class="row"><span>Fakturace</span><span class="val">${s.hours * rate ? (s.hours * rate).toLocaleString("cs-CZ") + " Kč" : "–"}</span></div>
      </div>
      <div class="mc-footer">
        ${s.vac  ? `<span class="pill pill-vac">🌴 ${s.vac}d dov.</span>` : "<span></span>"}
        ${s.sick ? `<span class="pill pill-sick">🤒 ${s.sick}d nem.</span>` : "<span></span>"}
      </div>`;
    grid.appendChild(mc);
  }

  const stats = document.getElementById("yearStats");
  stats.innerHTML = `
    <div class="stat-box"><div class="sv">${totalHours}</div><div class="sl">Odprac. hodin celkem</div></div>
    <div class="stat-box"><div class="sv">${totalKc.toLocaleString("cs-CZ")} Kč</div><div class="sl">Fakturace celkem</div></div>
    <div class="stat-box"><div class="sv">${totalVac}</div><div class="sl">Dní dovolené</div></div>
    <div class="stat-box"><div class="sv">${totalSick}</div><div class="sl">Dní nemoci</div></div>
    <div class="stat-box"><div class="sv">${rate} Kč</div><div class="sl">Hodinová sazba</div></div>`;
}

function renderMonth(m) {
  const days  = DATA.months[String(m)]?.days || [];
  const tbody = document.getElementById(`tbody${m}`);
  const tfoot = document.getElementById(`tfoot${m}`);
  const mhead = document.getElementById(`mhead${m}`);
  const badge = document.getElementById(`badge${m}`);
  tbody.innerHTML = "";

  let totalHours = 0;

  for (let i = 0; i < days.length; i++) {
    const d = days[i];
    const dt = new Date(d.date);
    const dow = DNYTYDEN[dt.getDay() === 0 ? 6 : dt.getDay() - 1];
    const h = d.type === "work" ? calcHours(d.start, d.end) : 0;
    totalHours += h;

    const tr = document.createElement("tr");
    tr.className = d.type;

    const typLabel = { work: "Práce", vacation: "Dovolená", sick: "Nemoc", holiday: "Svátek" };
    const disabled = d.type !== "work" ? "disabled" : "";

    tr.innerHTML = `
      <td>${dt.toLocaleDateString("cs-CZ", {day:"2-digit", month:"2-digit", year:"numeric"})}</td>
      <td>${dow}</td>
      <td>
        <select class="type-select" onchange="changeType(${m},${i},this.value)">
          <option value="work"     ${d.type==="work"     ?"selected":""}>✅ Práce</option>
          <option value="vacation" ${d.type==="vacation" ?"selected":""}>🌴 Dovolená</option>
          <option value="sick"     ${d.type==="sick"     ?"selected":""}>🤒 Nemoc</option>
          ${d.type==="holiday" ? `<option value="holiday" selected>🎉 Svátek (${d.holiday_name||""})</option>` : ""}
        </select>
      </td>
      <td><input class="time-input" type="time" value="${d.start||""}" ${disabled}
           onchange="changeTime(${m},${i},'start',this.value)"></td>
      <td><input class="time-input" type="time" value="${d.end||""}" ${disabled}
           onchange="changeTime(${m},${i},'end',this.value)"></td>
      <td class="hours-cell" id="hcell_${m}_${i}">${h || (d.type==="holiday" ? "–" : "")}</td>`;
    tbody.appendChild(tr);
  }

  tfoot.innerHTML = `<tr><td colspan="5" style="text-align:right; padding-right:12px">Celkem za měsíc:</td>
    <td style="text-align:center; font-size:15px">${totalHours} h</td></tr>`;

  mhead.textContent = `${MESICE[m-1]} 2026 — ${totalHours} hodin, ${totalHours * (DATA.rate||400)} Kč`;
  badge.textContent = `${totalHours}h`;

  checkPdfExists(m);
}

// ── Úpravy dat ────────────────────────────────────────────────────────────────
function changeType(m, i, newType) {
  const d = DATA.months[String(m)].days[i];
  d.type = newType;
  if (newType !== "work") { d.start = null; d.end = null; }
  else { d.start = d.start || "12:00"; d.end = d.end || "20:00"; }
  renderMonth(m);
  renderOverview();
  scheduleSave();
}

function changeTime(m, i, field, val) {
  DATA.months[String(m)].days[i][field] = val;
  const d = DATA.months[String(m)].days[i];
  const h = calcHours(d.start, d.end);
  document.getElementById(`hcell_${m}_${i}`).textContent = h;
  renderMonth(m);
  renderOverview();
  scheduleSave();
}

// ── Uložení ───────────────────────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  document.getElementById("saveStatus").textContent = "Neuložené změny…";
  saveTimer = setTimeout(saveData, 2000);
}

async function saveData() {
  clearTimeout(saveTimer);
  const st = document.getElementById("saveStatus");
  st.textContent = "Ukládám…";
  try {
    await fetch("/api/data/2026", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(DATA),
    });
    st.textContent = "✓ Uloženo";
    setTimeout(() => { st.textContent = ""; }, 3000);
  } catch(e) {
    st.textContent = "❌ Chyba uložení";
  }
}

// ── PDF generování ────────────────────────────────────────────────────────────
async function generatePdf(m) {
  const spinner = document.getElementById(`pdfSpinner${m}`);
  spinner.style.display = "inline-block";
  try {
    const resp = await fetch(`/api/generate/2026/${m}`, { method: "POST" });
    const data = await resp.json();
    if (data.status === "ok") {
      showToast(`PDF pro ${MESICE[m-1]} vygenerováno ✓`);
      document.getElementById(`pdfLink${m}`).style.display = "";
    } else {
      showToast("Chyba: " + data.message, true);
    }
  } catch(e) {
    showToast("Chyba připojení", true);
  } finally {
    spinner.style.display = "none";
  }
}

async function checkPdfExists(m) {
  try {
    const r = await fetch(`/api/pdf/2026/${m}`, { method: "HEAD" });
    if (r.ok) document.getElementById(`pdfLink${m}`).style.display = "";
  } catch(e) {}
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function switchTab(el, panel) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  document.getElementById(`panel-${panel}`).classList.add("active");
}

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => { t.className = "toast"; }, 3000);
}

init();
</script>
</body>
</html>
