<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Výkaz práce 2026 – Šimon Jeleňák</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ══ ZÁKLADNÍ STYL ══════════════════════════════════════════════════════════ */
:root {
  --blue:  #1F4E79;
  --blue2: #2E75B6;
  --blue3: #deeaf1;
  --yel:   #fff8dc;
  --red:   #fde8e8;
  --ora:   #fff0e0;
  --gra:   #f4f6f9;
  --brd:   #d0d5dd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,"Segoe UI",Arial,sans-serif; font-size:13px;
       color:#1a1a2e; background:#eef2f7; }

/* ── Hlavička ── */
header {
  background: var(--blue); color:#fff;
  padding: 0 20px; height: 52px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
header h1 { font-size:15px; font-weight:700; }
header .sp { flex:1; }
.btn { display:inline-flex; align-items:center; gap:5px; padding:6px 13px;
       border-radius:6px; border:none; cursor:pointer; font-size:12px;
       font-weight:600; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-pdf  { background:#e67e22; color:#fff; }
.btn-save { background:#27ae60; color:#fff; }
.saved-lbl { font-size:11px; color:rgba(255,255,255,.65); }

/* ── Záložky ── */
.tabs { display:flex; gap:2px; padding:10px 20px 0;
        background:var(--blue); overflow-x:auto; }
.tab  { padding:6px 12px; border-radius:8px 8px 0 0; cursor:pointer;
        font-size:11px; font-weight:600; color:rgba(255,255,255,.6);
        background:rgba(255,255,255,.1); border:none; white-space:nowrap; }
.tab:hover { background:rgba(255,255,255,.2); color:#fff; }
.tab.on { background:#eef2f7; color:var(--blue); }
.bdg { background:var(--blue2); color:#fff; border-radius:10px;
       padding:1px 6px; font-size:10px; margin-left:3px; }
.tab.on .bdg { background:var(--blue2); }

/* ── Obsah ── */
main { padding:18px 20px; }
.panel { display:none; }
.panel.on { display:block; }

/* ── Karta ── */
.card { background:#fff; border-radius:10px;
        box-shadow:0 1px 5px rgba(0,0,0,.1); overflow:hidden; margin-bottom:18px; }
.card-h { background:var(--blue); color:#fff; padding:9px 14px;
          font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; }
.card-b { padding:14px; }

/* ── Roční přehled ── */
.yr-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.sbox { background:#fff; border:1.5px solid var(--brd); border-radius:8px;
        padding:10px 16px; text-align:center; min-width:130px; }
.sbox .v { font-size:20px; font-weight:800; color:var(--blue); }
.sbox .l { font-size:11px; color:#666; margin-top:2px; }

.yr-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
.mc { border:1.5px solid var(--brd); border-radius:8px; overflow:hidden;
      cursor:pointer; transition:box-shadow .15s,border-color .15s; }
.mc:hover { box-shadow:0 3px 10px rgba(0,0,0,.12); border-color:var(--blue2); }
.mc-h { background:var(--blue2); color:#fff; padding:6px 11px;
        font-weight:700; font-size:12px; display:flex; justify-content:space-between; }
.mc-b { padding:7px 11px; font-size:12px; line-height:1.9; }
.mc-b .r { display:flex; justify-content:space-between; }
.mc-b .vv { font-weight:700; color:var(--blue); }
.mc-f { background:var(--gra); padding:4px 11px; font-size:11px; color:#666;
        display:flex; justify-content:space-between; align-items:center; }
.pill { display:inline-block; padding:1px 6px; border-radius:10px;
        font-size:10px; font-weight:600; }
.pv { background:#fffbcc; color:#856404; }
.ps { background:#fde8e8; color:#a00; }

/* ── Měsíční tabulka ── */
.m-bar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.m-bar h2 { font-size:15px; color:var(--blue); }
.m-bar .sp { flex:1; }
.leg { display:flex; gap:8px; font-size:11px; }
.li  { display:flex; align-items:center; gap:4px; }
.ld  { width:12px; height:12px; border-radius:3px; border:1px solid #ccc; }

table.dt { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }
table.dt th { background:var(--blue); color:#fff; padding:5px 7px;
              text-align:left; font-size:11px; white-space:nowrap; }
table.dt td { padding:3px 6px; border-bottom:1px solid #eee; vertical-align:middle; }
/* Pevné šířky sloupců, poslední zabere zbytek */
table.dt th:nth-child(1), table.dt td:nth-child(1) { width:100px; }  /* Datum */
table.dt th:nth-child(2), table.dt td:nth-child(2) { width:80px; }   /* Den */
table.dt th:nth-child(3), table.dt td:nth-child(3) { width:100px; }  /* Typ */
table.dt th:nth-child(4), table.dt td:nth-child(4) { width:80px; }   /* Začátek */
table.dt th:nth-child(5), table.dt td:nth-child(5) { width:80px; }   /* Konec */
table.dt th:nth-child(6), table.dt td:nth-child(6) { width:65px; text-align:center; } /* Hodin */
table.dt th:nth-child(7) { text-align:center; }   /* Odprac. hodiny celkem — header */
table.dt td:nth-child(7) { text-align:center; font-weight:bold; }    /* hodnoty */
table.dt tr.tw td { background:#fff; }
table.dt tr.tv td { background:var(--yel); }
table.dt tr.ts td { background:var(--red); }
table.dt tr.th td { background:var(--ora); color:#888; }
table.dt tr:hover td { filter:brightness(.97); }

select.tp { padding:2px 4px; border:1px solid var(--brd); border-radius:4px;
            font-size:11px; background:transparent; cursor:pointer; width:110px; }
input.ti  { width:56px; padding:2px 4px; border:1px solid var(--brd);
            border-radius:4px; font-size:11px; font-family:monospace; text-align:center; }
input.ti:disabled { opacity:.35; }
.pt { display:none; font-size:12px; font-family:monospace; }
.hc { font-weight:700; text-align:center; min-width:36px; }

tfoot td { font-weight:700; font-size:13px; padding:6px 8px;
           border-top:2px solid var(--blue); background:var(--blue3); color:var(--blue); }

/* ── Toast ── */
.toast { position:fixed; bottom:18px; right:18px; background:#27ae60; color:#fff;
         padding:10px 16px; border-radius:8px; font-size:13px; font-weight:600;
         box-shadow:0 4px 12px rgba(0,0,0,.2); opacity:0; transition:opacity .3s;
         pointer-events:none; z-index:999; }
.toast.on { opacity:1; }
.toast.err { background:#e74c3c; }

/* ══ TISK / PDF ══════════════════════════════════════════════════════════════
   Při tisku se zobrazí pouze aktivní měsíc ve formátu výkazu práce.
   Obsah je vždy přizpůsoben na 1 stránku A4.                               */
@media print {
  header, .tabs, .m-bar, .leg, .yr-stats, .yr-grid, .card-h,
  .panel:not(.on), tfoot, .no-print { display:none !important; }

  html, body { background:#fff !important; margin:0 !important; padding:0 !important; }
  main { padding:0 !important; margin:0 !important; }
  .panel.on { display:block !important; }
  .card { box-shadow:none !important; border-radius:0 !important; }
  .card-b { padding:0 !important; }
  .print-header { display:block !important; }

  /* Škálování na 1 stránku A4 — celý obsah se vejde */
  .panel.on {
    position: absolute;
    top: 0; left: 0;
    width: 210mm;
    transform-origin: top left;
    /* scale dopočítá JS před tiskem, výchozí hodnota pro jistotu */
    transform: scale(1);
  }

  /* ── Černobílé ── */
  * { color:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  table.dt th    { background:#e0e0e0 !important; }
  table.dt tr.tv td,
  table.dt tr.ts td,
  table.dt tr.th td { background:#f0f0f0 !important; }
  .ph-info td.lb,
  .ph-rate th    { background:#e0e0e0 !important; }
  .ph-title      { color:#000 !important; }

  /* ── Tabulka hodin ── */
  table.dt { font-size:7.5pt; width:100% !important; table-layout:fixed; }
  table.dt th, table.dt td { padding:1.5px 4px !important; }
  /* Datum, Den, Typ(skryt), Začátek, Konec, Hodin — pevné; poslední zbytek */
  table.dt th:nth-child(1), table.dt td:nth-child(1) { width:20mm; }
  table.dt th:nth-child(2), table.dt td:nth-child(2) { width:16mm; }
  table.dt th:nth-child(3), table.dt td:nth-child(3) { width:14mm; }
  table.dt th:nth-child(4), table.dt td:nth-child(4) { width:14mm; }
  table.dt th:nth-child(5), table.dt td:nth-child(5) { width:12mm; }
  table.dt th:nth-child(6), table.dt td:nth-child(6) { width:12mm; }
  table.dt th:last-child { width:auto; text-align:right; padding-right:4px; }
  table.dt td:last-child { width:auto; text-align:center; font-weight:bold; }

  select.tp, input.ti { display:none !important; }
  .pt { display:inline !important; }
  .hc { font-weight:700; }

  @page { size:A4 portrait; margin:10mm; }
}

/* Hlavička výkazu pro tisk (skryta na obrazovce) */
.print-header { display:none; }
.ph-top { display:table; width:100%; margin-bottom:7mm; }
.ph-left { display:table-cell; width:55%; vertical-align:top;
           font-size:9pt; line-height:1.7; }
.ph-right { display:table-cell; text-align:right; vertical-align:top; }
.ph-title { font-size:26pt; font-weight:bold; line-height:1; }
.ph-sub   { font-size:9pt; color:#555; margin-top:2px; }
.ph-info  { width:100%; border-collapse:collapse; margin-bottom:4mm; }
.ph-info td { border:0.5pt solid #aaa; padding:3px 6px; font-size:9pt; }
.ph-info td.lb { font-weight:bold; width:25mm; background:#f0f0f0; }
.ph-rate  { width:100%; border-collapse:collapse; margin-bottom:3mm; }
.ph-rate th { border:0.5pt solid #aaa; padding:3px 6px; background:#e0e0e0;
              font-weight:bold; font-size:8.5pt; text-align:left; }
.ph-rate td { border:0.5pt solid #aaa; padding:3px 6px; font-size:9pt; }
.ph-desc  { border:0.5pt solid #aaa; padding:3px 8px 4px 8px;
            margin-bottom:4mm; font-size:8.5pt; line-height:1.6; }
.ph-desc ul { margin-left:14px; }
.ph-foot  { width:100%; border-collapse:collapse; margin-top:5mm; }
.ph-foot td { border:0.5pt solid #aaa; padding:4px 8px; height:22mm; vertical-align:top; }
.ph-foot td.fc { width:60%; }
.ph-foot td.fd { width:40%; font-weight:bold; font-size:9pt; vertical-align:middle; }
</style>
</head>
<body>

<header>
  <h1>📋 Výkaz práce 2026 — Šimon Jeleňák</h1>
  <div class="sp"></div>
  <span class="saved-lbl" id="saveLbl"></span>
  <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.85)" class="no-print">

    <input id="rateInput" type="number" min="1" step="1"
           style="width:70px;padding:4px 6px;border-radius:5px;border:1px solid rgba(255,255,255,.4);

           onchange="changeRate(this.value)">

  </label>
  <button class="btn btn-pdf no-print" onclick="printPdf()">🖨 Tisk</button>

  <button class="btn no-print" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)"

  <button class="btn no-print" id="btnGraph"
          style="background:#0078d4;color:#fff"

<div class="tabs" id="tabBar">

</div>

<main>
  <div class="panel on" id="panel-overview">
    <div class="yr-stats" id="yrStats"></div>
    <div class="card">
      <div class="card-h">📅 Přehled měsíců 2026</div>
      <div class="card-b"><div class="yr-grid" id="yrGrid"></div></div>
    </div>
  </div>
  <!-- měsíční panely generuje JS -->
</main>

<div class="toast" id="toast"></div>

<script>
// ══ DATA ═════════════════════════════════════════════════════════════════════
const MESICE = ["Leden","Únor","Březen","Duben","Květen","Červen",
                "Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const DNYTYDEN = ["Pondělí","Úterý","Středa","Čtvrtek","Pátek","Sobota","Neděle"];
const RATE = 400;

// České státní svátky 2026
const HOLIDAYS = {
  "2026-01-01":"Nový rok",
  "2026-04-03":"Velký pátek",
  "2026-04-06":"Velikonoční pondělí",
  "2026-05-01":"Svátek práce",
  "2026-05-08":"Den vítězství",
  "2026-07-05":"Cyril a Metoděj",
  "2026-07-06":"Jan Hus",
  "2026-09-28":"Den české státnosti",
  "2026-10-28":"Den vzniku ČSR",
  "2026-11-17":"Den boje za svobodu",
  "2026-12-24":"Štědrý den",
  "2026-12-25":"1. svátek vánoční",
  "2026-12-26":"2. svátek vánoční",
};

// Inicializace dat pro rok 2026
// Náhodný začátek směny (vždy 8 hodin) — bez pravidelného vzoru
const SHIFTS = [
  {start:"12:00", end:"20:00"},
  {start:"12:00", end:"20:00"},  // 12:00 častější (jako ve vzoru)
  {start:"13:00", end:"21:00"},
  {start:"13:30", end:"21:30"},
  {start:"14:00", end:"22:00"},
];
// Použijeme deterministické pseudo-náhodné číslo odvozené od data,
// aby se hodnoty po reload nezměnily (dokud se data neresetují).
function randShift(seed) {
  // xorshift32 — jednoduchý hash ze seedu
  let x = (seed ^ 0xdeadbeef) >>> 0;
  x ^= x << 13; x ^= x >> 17; x ^= x << 5;
  return SHIFTS[Math.abs(x) % SHIFTS.length];
}

// Vrací "YYYY-MM-DD" v lokálním čase (bez UTC posunu)
function localISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function initData() {
  const months = {};
  let d = new Date(2026, 0, 1); // 1. ledna 2026 v lokálním čase
  while (d.getFullYear() === 2026) {
    const dow = d.getDay(); // 0=Ne,6=So
    if (dow >= 1 && dow <= 5) { // Po–Pá
      const iso = localISO(d);
      const m   = String(d.getMonth()+1);
      if (!months[m]) months[m] = { days: [] };
      if (HOLIDAYS[iso]) {
        months[m].days.push({ date:iso, type:"holiday", name:HOLIDAYS[iso], start:null, end:null });
      } else {
        // seed = den v roce, aby byl výsledek stabilní při každém načtení
        const dayOfYear = Math.floor((d - new Date(2026,0,1)) / 86400000);
        months[m].days.push({ date:iso, type:"work", ...randShift(dayOfYear) });
      }
    }
    d.setDate(d.getDate()+1);
  }
  return { year:2026, rate:RATE, months };
}

function loadData() {
  const raw = localStorage.getItem("vykaz2026");
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  return initData();
}

function saveData(silent=false) {
  localStorage.setItem("vykaz2026", JSON.stringify(DATA));
  if (!silent) {
    document.getElementById("saveLbl").textContent = "✓ Uloženo";
    setTimeout(() => document.getElementById("saveLbl").textContent="", 2500);
  }
}

let DATA = loadData();

// ══ VÝPOČTY ═══════════════════════════════════════════════════════════════════
function calcH(s, e) {
  if (!s||!e) return 0;
  const [sh,sm]=s.split(":").map(Number), [eh,em]=e.split(":").map(Number);
  return (eh*60+em-sh*60-sm)/60;
}
function monthStats(m) {
  const days = DATA.months[m]?.days || [];
  let work=0, vac=0, sick=0, hours=0;
  for (const d of days) {
    if (d.type==="work")     { work++; hours+=calcH(d.start,d.end); }
    if (d.type==="vacation") vac++;
    if (d.type==="sick")     sick++;
  }
  return {work,vac,sick,hours};
}
function fmtDate(iso) {
  const [y,m,d]=iso.split("-");
  return `${d}.${m}.${y}`;
}
function lastDay(m) {
  return new Date(2026, m, 0).getDate(); // den v měsíci
}
function lastDayFmt(m) {
  const d = new Date(2026, m, 0); // poslední den měsíce m (1-based), lokální čas
  return fmtDate(localISO(d));
}

// ══ SESTAVENÍ UI ══════════════════════════════════════════════════════════════
function buildTabs() {
  const bar = document.getElementById("tabBar");
  for (let m=1; m<=12; m++) {
    const btn = document.createElement("button");
    btn.className = "tab";
    btn.dataset.p = "m"+m;
    btn.innerHTML = `${MESICE[m-1]}<span class="bdg" id="bdg${m}">–</span>`;
    btn.onclick = function(){ sw(this,"m"+m); };
    bar.appendChild(btn);
  }
}

function buildMonthPanel(m) {
  const main = document.querySelector("main");
  const div  = document.createElement("div");
  div.className = "panel";
  div.id = "panel-m"+m;

  div.innerHTML = `
    <!-- Hlavička pro tisk -->
    <div class="print-header" id="ph${m}">
      <div class="ph-top">
        <div class="ph-left">
          <b>FORTOOL-TECHNOLOGIES, S.R.O.</b><br><br>
          Dukelská 626/88<br>293 01 Mladá Boleslav<br>IČ: 06037976
        </div>
        <div class="ph-right">
          <div class="ph-title">VÝKAZ PRÁCE</div>
          <div class="ph-sub">MĚSÍC: ${MESICE[m-1].toUpperCase()} 2026</div>
        </div>
      </div>
      <table class="ph-info">
        <tr><td class="lb">FIRMA:</td><td>ŠIMON JELEŇÁK</td></tr>
        <tr><td class="lb">IČ:</td><td>43758207</td></tr>
        <tr><td class="lb">ADRESA:</td><td>ZDĚTÍN 151, 294 71 BENÁTKY NAD JIZEROU</td></tr>
      </table>
      <table class="ph-rate">
        <tr><th>JMÉNO</th><th>SAZBA</th><th>HODIN CELKEM</th><th>CELKEM</th></tr>
        <tr><td>ŠIMON JELEŇÁK</td><td>${DATA.rate} KČ</td>
            <td id="ph-hours${m}">–</td><td id="ph-total${m}">–</td></tr>
      </table>
      <div class="ph-desc">
        Poradenská činnost k obchodním službám:
        <ul>
          <li>zpracování obchodních poptávek</li>
          <li>příprava podkladů a vedení technických jednání v rámci těchto poptávek</li>
          <li>získávání potřebných informací pro poptávky a komunikace s interními odděleními zákazníka.</li>
          <li>kalkulace a návrh cenových sazeb</li>
          <li>tvorba konkrétních nabídek na základě technických jednání</li>
          <li>tvorba předávacích protokolů a další práce s nimi</li>
        </ul>
      </div>
    </div>

    <!-- Toolbar (obrazovka) -->
    <div class="m-bar no-print">
      <h2>${MESICE[m-1]} 2026</h2>
      <div class="sp"></div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#fff"></div>Práce</div>
        <div class="li"><div class="ld" style="background:var(--yel)"></div>Dovolená</div>
        <div class="li"><div class="ld" style="background:var(--red)"></div>Nemoc</div>
        <div class="li"><div class="ld" style="background:var(--ora)"></div>Svátek</div>
      </div>
    </div>

    <!-- Tabulka dní -->

function renderMonth(m) {

  let total = 0;

  for (let i=0; i<days.length; i++) {
    const d   = days[i];
    const dt  = new Date(d.date+"T00:00:00"); // T00:00:00 = lokální čas, ne UTC
    const dow = DNYTYDEN[dt.getDay()===0?6:dt.getDay()-1];
    const h   = d.type==="work" ? calcH(d.start,d.end) : 0;
    total += h;

    const cls = {work:"tw",vacation:"tv",sick:"ts",holiday:"th"}[d.type]||"tw";

function pdfFilename(m) {
  const mm = String(m).padStart(2,"0");
  return `S.Jelenak_vykaz prace ${mm}_2026.pdf`;
}

function printPdf() {
  const m = activeMonth();
  if (!m) { showToast("Přejděte nejprve na konkrétní měsíc.", true); return; }

  // Spočítáme scale tak, aby se obsah vešel na 1 stránku A4 (výška 277mm po odečtení margins 10mm*2)
  const panel = document.getElementById("panel-m"+m);
  const contentH = panel.scrollHeight;           // px na obrazovce
  const a4H = 277 * 3.7795;                      // 277mm → px (96dpi)
  const scale = Math.min(1, a4H / contentH);

  panel.style.transform = `scale(${scale})`;
  panel.style.transformOrigin = "top left";
  panel.style.width = (100 / scale) + "%";

  const old = document.title;
  document.title = pdfFilename(m).replace(".pdf","");

  window.print();

  // Vrátíme stav po tisku
  setTimeout(() => {
    panel.style.transform = "";
    panel.style.transformOrigin = "";
    panel.style.width = "";
    document.title = old;
  }, 500);
}

async function exportPdf() {
  const m = activeMonth();
  if (!m) { showToast("Přejděte nejprve na konkrétní měsíc.", true); return; }

  const btn = document.getElementById("btnExport");
  btn.textContent = "⏳ Generuji…";
  btn.disabled = true;

  try {
    // Sestavíme izolovaný HTML dokument pro snímání — bez paddingů, sidebar, karet
    const printHtml = buildPrintHtml(m);

    // Vykreslíme do skrytého iframe přesné šířky A4 (794px @ 96dpi)
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:794px;height:1123px;border:none;";
    document.body.appendChild(iframe);
    iframe.contentDocument.open();
    iframe.contentDocument.write(printHtml);
    iframe.contentDocument.close();
    await new Promise(r => iframe.onload = r || setTimeout(r, 300));
    await new Promise(r => setTimeout(r, 200)); // počkáme na vykreslení

    const canvas = await html2canvas(iframe.contentDocument.body, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      width: 794,
      windowWidth: 794,
    });
    document.body.removeChild(iframe);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });

    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 10;
    const maxW = pageW - margin * 2;
    const maxH = pageH - margin * 2;

    // Přizpůsobíme rozměry tak, aby se obsah vždy vešel na 1 stránku
    const ratio = canvas.width / canvas.height;
    let finalW = maxW;
    let finalH = maxW / ratio;
    if (finalH > maxH) {
      finalH = maxH;
      finalW = maxH * ratio;
    }
    const offsetX = margin + (maxW - finalW) / 2;

    const img = canvas.toDataURL("image/jpeg", 0.95);
    pdf.addImage(img, "JPEG", offsetX, margin, finalW, finalH);

    pdf.save(pdfFilename(m));
    showToast(`✓ Staženo: ${pdfFilename(m)}`);
  } catch(e) {
    showToast("Chyba exportu: "+e.message, true);
    console.error(e);
  } finally {
    btn.textContent = "📥 Export PDF";
    btn.disabled = false;
  }
}

let _accessToken = null;

function getTokenFromStorage() {
  const saved = sessionStorage.getItem("graph_token");
  if (!saved) return null;
  try {
    const { token, expiry } = JSON.parse(saved);
    if (Date.now() < expiry - 60000) return token;
  } catch(e) {}
  return null;
}

async function getToken() {
  // 1. Použijeme uložený token pokud je stále platný
  const cached = getTokenFromStorage();
  if (cached) return cached;

  // 2. Otevřeme přihlašovací popup (implicit flow — token rovnou v URL)
  const params = new URLSearchParams({
    client_id:     GRAPH_CONFIG.clientId,
    response_type: "token",
    redirect_uri:  "http://localhost",
    scope:         "https://graph.microsoft.com/Calendars.Read https://graph.microsoft.com/User.Read",
    response_mode: "fragment",
    nonce:         Math.random().toString(36).slice(2),
    prompt:        "consent",
  });

  const authUrl = `https://login.microsoftonline.com/common/oauth2/v2.0/authorize?${params}`;
  const popup   = window.open(authUrl, "graph_auth", "width=520,height=640,left=200,top=100");

  if (!popup) throw new Error("Prohlížeč zablokoval popup okno. Povolte popupy pro tento soubor.");

  // Po přihlášení Microsoft přesměruje na http://localhost/#access_token=...
  // Prohlížeč zobrazí chybovou stránku, ale token je v adresním řádku.
  // Zobrazíme dialog pro vložení URL.
  return new Promise((resolve, reject) => {
    // Nejprve zkusíme automatické čtení (funguje pokud popup není blokován cross-origin)
    const timer = setInterval(() => {
      try {
        const url = popup.location.href;
        if (url && url.startsWith("http://localhost")) {
          clearInterval(timer);
          popup.close();
          extractToken(url, resolve, reject);
          return;
        }
      } catch(e) { /* cross-origin, čekáme */ }
      if (popup.closed) {
        clearInterval(timer);
        showTokenPasteDialog(resolve, reject);
      }
    }, 300);

    // Po 60s timeout — zobrazíme manuální dialog
    setTimeout(() => {
      clearInterval(timer);
      if (!popup.closed) popup.close();
      showTokenPasteDialog(resolve, reject);
    }, 60000);
  });
}

function extractToken(url, resolve, reject) {
  const hash   = url.includes("#") ? url.split("#")[1] : url.split("?")[1] || "";
  const parsed = new URLSearchParams(hash);
  const token  = parsed.get("access_token");
  if (token) {
    const expiry = Date.now() + parseInt(parsed.get("expires_in") || "3600") * 1000;
    sessionStorage.setItem("graph_token", JSON.stringify({ token, expiry }));
    resolve(token);
  } else {
    reject(new Error(parsed.get("error_description") || parsed.get("error") || "Token nebyl nalezen v URL."));
  }
}

function showTokenPasteDialog(resolve, reject) {
  // Odstraníme případný starý dialog
  const old = document.getElementById("tokenDialog");
  if (old) old.remove();

  const dlg = document.createElement("div");

      <h3 style="margin:0 0 12px;font-size:16px">📋 Zkopírujte URL z popup okna</h3>
      <p style="margin:0 0 14px;font-size:13px;color:#444;line-height:1.6">
        Přihlásili jste se. Popup zobrazuje chybovou stránku, ale v adresním řádku je URL s tokenem.<br>
        <b>Zkopírujte celou URL adresu</b> z adresního řádku popup okna a vložte ji sem:
      </p>
      <img src="" style="display:none" onerror="">
      <input id="tokenUrlInput" type="text" placeholder="localhost/#access_token=eyJ..."
        style="width:100%;padding:8px 10px;border:1.5px solid #aaa;border-radius:5px;font-size:12px;box-sizing:border-box;margin-bottom:14px">
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button onclick="document.getElementById('tokenDialog').remove();window._tokenReject&&window._tokenReject(new Error('Zrušeno'))"
          style="padding:8px 18px;border:1px solid #ccc;background:#fff;border-radius:5px;cursor:pointer">Zrušit</button>
        <button onclick="window._tokenConfirm()"
          style="padding:8px 18px;background:#0078d4;color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:bold">Potvrdit</button>
      </div>
    </div>`;
  document.body.appendChild(dlg);

  window._tokenReject  = reject;
  window._tokenConfirm = () => {
    const url = document.getElementById("tokenUrlInput").value.trim();
    dlg.remove();
    if (!url) { reject(new Error("Nebyla zadána žádná URL.")); return; }
    extractToken(url.startsWith("http") ? url : "http://" + url, resolve, reject);
  };

  // Enter potvrdí
  document.getElementById("tokenUrlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") window._tokenConfirm();
  });
}

  btn.disabled = true;

  try {
    const token = await getToken();
    btn.textContent = "⏳ Načítám…";

    // Ověření přihlášení
    const meResp = await fetch("https://graph.microsoft.com/v1.0/me", { headers: { Authorization: `Bearer ${token}` } });
    if (!meResp.ok) {
      sessionStorage.removeItem("graph_token");
      const meErr = await meResp.json().catch(() => ({}));
      throw new Error(`Graph API /me ${meResp.status}: ${meErr?.error?.message || meResp.statusText}`);
    }
    const me = await meResp.json();
    console.log("Přihlášen jako:", me.userPrincipalName, me.displayName);

    const h = { Authorization: `Bearer ${token}` };

    // Nejprve zkusíme $search pro klíčová slova
    const searchResp = await fetch(
      `https://graph.microsoft.com/v1.0/me/events?$search="Dovolená OR Nemoc OR Dovolena"&$select=subject,start,end&$top=100`, { headers: h });
    let events = [];
    if (searchResp.ok) {
      events = (await searchResp.json()).value || [];
      console.log("$search výsledky:", events.map(e => `${(e.start.dateTime||e.start.date||"").slice(0,10)}: ${e.subject}`));
    }

    // Fallback: všechny osobní kalendáře
    const calResp = await fetch("https://graph.microsoft.com/v1.0/me/calendars?$select=id,name&$top=50", { headers: h });
    const calendars = (await calResp.json()).value || [];
    console.log("Kalendáře:", calendars.map(c => c.name));
    const df = `startDateTime=2026-01-01T00:00:00Z&endDateTime=2026-12-31T23:59:59Z`;
    let allEvents = [];
    for (const cal of calendars) {
      const r = await fetch(`https://graph.microsoft.com/v1.0/me/calendars/${cal.id}/calendarView?${df}&$select=subject,start,end&$top=500`, { headers: h });
      if (!r.ok) continue;
      allEvents = allEvents.concat((await r.json()).value || []);
    }
    const kwEvents = allEvents.filter(e => /dovolená|dovolena|nemoc/i.test(e.subject || ""));
    console.log("Dovolená/Nemoc z calendarView:", kwEvents.map(e => `${(e.start.dateTime||e.start.date||"").slice(0,10)}: ${e.subject}`));
    if (events.length === 0) events = kwEvents;

    // Převedeme Graph události do stejného formátu jako ICS parser
    // dateTime z Graph je v lokálním čase daného timezone, ne UTC — nepřidáváme Z
    const icsLike = events.map(ev => ({
      subject: ev.subject,
      dates: (() => {
        const dates = [];
        const startStr = ev.start.dateTime ? ev.start.dateTime.slice(0,10) : ev.start.date;
        const endStr   = ev.end.dateTime   ? ev.end.dateTime.slice(0,10)   : ev.end.date;
        let d = new Date(startStr + "T00:00:00");
        const e = new Date(endStr + "T00:00:00");
        while (d < e) { dates.push(localISO(d)); d.setDate(d.getDate() + 1); }
        return dates;
      })(),
    }));

    // Použijeme stejnou logiku jako ICS import
    applyAndRender(icsLike);

  } catch(e) {
    console.error(e);
    showToast("Chyba: " + e.message, true);
  } finally {
    btn.textContent = "📅 Načíst z Outlooku";
    btn.disabled = false;
  }
}

// ══ GOOGLE CALENDAR — načtení přes soukromou ICS URL ═════════════════════════

async function loadFromGoogle() {
  const btn = document.getElementById("btnGoogle");
  const STORAGE_KEY = "google_ics_url";

  // Načteme uloženou URL nebo požádáme o novou
  let icsUrl = localStorage.getItem(STORAGE_KEY) || "";

  const entered = await new Promise(resolve => {
    const old = document.getElementById("googleUrlDialog");
    if (old) old.remove();
    const dlg = document.createElement("div");
    dlg.id = "googleUrlDialog";
    dlg.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);
      display:flex;align-items:center;justify-content:center;z-index:9999;`;
    dlg.innerHTML = `
      <div style="background:#fff;border-radius:8px;padding:28px 32px;max-width:640px;width:95%;box-shadow:0 8px 32px rgba(0,0,0,.3)">
        <h3 style="margin:0 0 10px;font-size:16px">📅 Načíst z Google Calendar</h3>
        <p style="margin:0 0 6px;font-size:13px;color:#444;line-height:1.6">
          Vložte <b>Soukromou adresu ve formátu iCal</b> z Google Calendar:<br>
          <span style="font-size:11px;color:#888">calendar.google.com → Nastavení → váš kalendář → dole „Soukromá adresa ve formátu iCal"</span>
        </p>
        <input id="gIcsUrlInput" type="text" value="${icsUrl.replace(/"/g,'&quot;')}"
          placeholder="https://calendar.google.com/calendar/ical/.../basic.ics"
          style="width:100%;padding:8px 10px;border:1.5px solid #aaa;border-radius:5px;font-size:12px;box-sizing:border-box;margin-bottom:14px">
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button onclick="document.getElementById('googleUrlDialog').remove();window._gResolve(null)"
            style="padding:8px 18px;border:1px solid #ccc;background:#fff;border-radius:5px;cursor:pointer">Zrušit</button>
          <button onclick="window._gResolve(document.getElementById('gIcsUrlInput').value.trim())"
            style="padding:8px 18px;background:#4285f4;color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:bold">Načíst</button>
        </div>
      </div>`;
    document.body.appendChild(dlg);
    window._gResolve = val => { dlg.remove(); resolve(val); };
    document.getElementById("gIcsUrlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") window._gResolve(document.getElementById("gIcsUrlInput").value.trim());
    });
    // Označit celé pole při kliknutí
    document.getElementById("gIcsUrlInput").select();
  });

  if (!entered) return;

  btn.textContent = "⏳ Načítám…";
  btn.disabled = true;

  try {
    localStorage.setItem(STORAGE_KEY, entered);

    // Na HTTPS (GitHub Pages) použijeme CORS proxy — funguje automaticky
    if (location.protocol === "https:") {
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(entered)}`;
      const resp = await fetch(proxyUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      if (!text.includes("BEGIN:VCALENDAR")) throw new Error("Neplatný ICS formát.");
      const events = parseIcs(text);
      applyAndRender(events);
      return;
    }

    // Na lokálním souboru (file://) — otevřeme URL v novém okně, uživatel vybere .ics
    window.open(entered, "_blank");
    btn.textContent = "📅 Načíst z Google";
    btn.disabled = false;
    const info = document.createElement("div");
    info.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);
      display:flex;align-items:center;justify-content:center;z-index:9999;`;
    info.innerHTML = `
      <div style="background:#fff;border-radius:8px;padding:28px 32px;max-width:480px;width:95%;box-shadow:0 8px 32px rgba(0,0,0,.3)">
        <h3 style="margin:0 0 12px;font-size:16px">💡 Tip: používejte online verzi</h3>
        <p style="margin:0 0 14px;font-size:13px;color:#444;line-height:1.7">
          Pro plnou automatizaci otevřete aplikaci na:<br>
          <a href="https://simonfortool.github.io/invoice/vykaz2026.html" target="_blank"
             style="color:#4285f4;font-weight:bold">simonfortool.github.io/invoice/vykaz2026.html</a><br><br>
          Tam stačí jedno kliknutí bez stahování souborů.
        </p>
        <button onclick="this.closest('div').parentElement.remove()"
          style="padding:8px 18px;background:#4285f4;color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:bold">OK</button>
      </div>`;
    document.body.appendChild(info);
    return;
  } catch(e) {
    console.error(e);
    showToast("Chyba Google Calendar: " + e.message, true);
  } finally {
    btn.textContent = "📅 Načíst z Google";
    btn.disabled = false;
  }
}

// ══ IMPORT ICS (Outlook kalendář) ═══════════════════════════════════════════

const KW_VACATION = ["dovolená šimon", "dovolena simon", "dovolená", "vacation"];
const KW_SICK     = ["nemoc šimon", "nemoc", "sick leave", "pracovní neschopnost"];

function classifySubject(subject) {
  const s = (subject || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  const sv = s.replace(/[^a-z ]/g,"");
  if (KW_VACATION.some(k => s.includes(k.normalize("NFD").replace(/[̀-ͯ]/g,"")))) return "vacation";
  if (KW_SICK.some(k => s.includes(k.normalize("NFD").replace(/[̀-ͯ]/g,"")))) return "sick";
  return null;
}

// Parsuje ICS datum — vrací "YYYY-MM-DD" v lokálním čase
function parseIcsDate(val) {
  if (!val) return null;
  // Celodenní datum: YYYYMMDD
  if (/^\d{8}$/.test(val)) {
    return `${val.slice(0,4)}-${val.slice(4,6)}-${val.slice(6,8)}`;
  }
  // DateTime: YYYYMMDDTHHmmss[Z]
  const y=val.slice(0,4), mo=val.slice(4,6), d=val.slice(6,8);
  const h=val.slice(9,11), mi=val.slice(11,13);
  if (val.endsWith("Z")) {
    return localISO(new Date(`${y}-${mo}-${d}T${h}:${mi}:00Z`));
  }
  return `${y}-${mo}-${d}`;
}

// Vrátí všechny ISO datumy od start do end (end je výlučný pro celodenní)
function datesInRange(startIso, endIso, allDay) {
  const dates = [];
  let d = new Date(startIso + "T00:00:00");
  const e = new Date(endIso  + "T00:00:00");
  const limit = allDay ? e : new Date(e.getTime() + 86400000);
  while (d < limit) {
    dates.push(localISO(d));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

// Parsuje celý ICS text na pole událostí { subject, dates[] }
function parseIcs(text) {
  const events = [];
  const blocks = text.split("BEGIN:VEVENT");
  for (let i = 1; i < blocks.length; i++) {
    const block = blocks[i];
    const get   = key => {
      const m = block.match(new RegExp(`${key}[^:]*:([^\\r\\n]+)`));
      return m ? m[1].trim() : null;
    };
    const summary = get("SUMMARY") || "";
    const dtstart = get("DTSTART") || "";
    const dtend   = get("DTEND")   || get("DTSTART") || "";
    const allDay  = /^\d{8}$/.test(dtstart);
    const startIso = parseIcsDate(dtstart);
    const endIso   = parseIcsDate(dtend);
    if (!startIso) continue;
    events.push({
      subject: summary,
      dates: datesInRange(startIso, endIso || startIso, allDay),
    });
  }
  return events;
}

function applyEventsToMonth(events, m) {
  // Sestavíme mapu datum → typ pouze pro rok 2026 a měsíc m
  const typeMap = {};
  for (const ev of events) {
    const type = classifySubject(ev.subject);
    if (!type) continue;
    for (const iso of ev.dates) {
      if (iso.startsWith(`2026-${String(m).padStart(2,"0")}`)) {
        typeMap[iso] = type;
      }
    }
  }
  return typeMap;
}

// Společná logika pro aplikaci událostí (Graph i ICS)
function applyAndRender(events, source) {
  const monthsFound = new Set();
  for (const ev of events) {
    const type = classifySubject(ev.subject);
    if (!type) continue;
    for (const iso of ev.dates) {
      if (iso.startsWith("2026-")) monthsFound.add(parseInt(iso.slice(5,7)));
    }
  }

  if (monthsFound.size === 0) {
    showToast("Nenalezeny žádné události Dovolená Šimon / Nemoc Šimon pro rok 2026.", true);
    return;
  }

  let totalChanged = 0, affectedMonths = [];
  for (const m of monthsFound) {
    const typeMap = applyEventsToMonth(events, m);
    let changed = 0;
    for (const day of DATA.months[String(m)]?.days || []) {
      if (day.type === "holiday") continue;
      const newType = typeMap[day.date];
      if (newType && day.type !== newType) {
        day.type = newType; day.start = null; day.end = null; changed++;
      } else if (!newType && (day.type === "vacation" || day.type === "sick")) {
        day.type = "work"; day.start = day.start || "12:00"; day.end = day.end || "20:00"; changed++;
      }
    }
    if (changed > 0) { renderMonth(m); affectedMonths.push(`${MESICE[m-1]} (${changed}×)`); totalChanged += changed; }
  }

  renderOverview();
  saveData(true);
  document.querySelector(`[data-p="m${Math.min(...monthsFound)}"]`).click();
  showToast(`✓ ${source}: ${affectedMonths.join(", ")} — ${totalChanged} změn`);
}

function loadIcs(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = "";
  const reader = new FileReader();
  reader.onload = e => {
    try {
      applyAndRender(parseIcs(e.target.result), "ICS");
    } catch(err) {
      showToast("Chyba ICS: " + err.message, true);
    }
  };
  reader.readAsText(file, "UTF-8");
}
